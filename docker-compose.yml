version: '3.9'

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-kata-workspace
    volumes:
      - /Users/jon/Code/Repos/code-kata-challenges:/workspace
      - node_modules:/workspace/node_modules
    ports:
      - "8888:8888"  # Jupyter
      - "3000:3000"  # Node.js applications
      - "5001:5000"  # ASP.NET applications
    environment:
      - NODE_ENV=development
      - PYTHONUNBUFFERED=1
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash

volumes:
  node_modules:
